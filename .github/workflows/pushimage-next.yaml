name: Next Dockerimage

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [build]

jobs:
  indexServerBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry support source code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Setup Go environment
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version: 1.26
      - name: Set up QEMU # Enables arm64 image building
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Login to Quay
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build and push the index server base image
        run: |
          cd index/server
          export GOPATH=$(go env GOPATH)
          go install github.com/deepmap/oapi-codegen/cmd/oapi-codegen@v1.12.4
          bash ./build-multi-arch.sh

  waitForKonfluxBuildStart:
    needs: indexServerBuild
    uses: ./.github/workflows/wait-for-check-start.yaml
    with:
      check-name: Red Hat Konflux / devfile-registry-base-main-on-push
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
    secrets:
      repo-token: ${{ secrets.GITHUB_TOKEN }}

  konfluxBuildWait:
    needs: waitForKonfluxBuildStart
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Red Hat Konflux / devfile-registry-base-main-on-push tasks to finish
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          ref: ${{ github.ref }}
          check-name: Red Hat Konflux / devfile-registry-base-main-on-push
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  waitForKonfluxECStart:
    needs: konfluxBuildWait
    uses: ./.github/workflows/wait-for-check-start.yaml
    with:
      check-name: Red Hat Konflux / devfile-registry-main-enterprise-contract / devfile-registry-base-main
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
    secrets:
      repo-token: ${{ secrets.GITHUB_TOKEN }}

  konfluxECWait:
    needs: waitForKonfluxECStart
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Red Hat Konflux / devfile-registry-main-enterprise-contract / devfile-registry-base-main checks to finish
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          allowed-conclusions: success,skipped,neutral
          ref: ${{ github.ref }}
          check-name: Red Hat Konflux / devfile-registry-main-enterprise-contract / devfile-registry-base-main
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  dispatchCommunity:
    needs: konfluxECWait
    runs-on: ubuntu-latest
    name: Dispatch Community Devfile Registry
    steps:
      - name: Get the repository name and commit sha
        id: get_commit_info
        run: |
          # Check if repository name is not set in the client payload
          # If it's not set, the triggered commit came from this repo (registry-support)
          # If it is set, the triggered commit came from registry-viewer
          if [ -z ${{ github.event.client_payload.repo }} ];
          then
            echo ::set-output name=repo::$(echo ${{ github.event.repository.name }})
          else
            echo ::set-output name=repo::$(echo ${{ github.event.client_payload.repo }})
          fi

          # Check if commit sha is not set in the client payload
          # If it's not set, the triggered commit came from this repo (registry-support)
          # If it is set, the triggered commit came from registry-viewer

          if [ -z ${{ github.event.client_payload.sha }} ];
          then
            echo ::set-output name=sha::$(echo ${{ github.sha }})
          else
            echo ::set-output name=sha::$(echo ${{ github.event.client_payload.sha }})
          fi
      - name: Repository dispatch
        uses: peter-evans/repository-dispatch@ce5485de42c9b2622d2ed064be479e8ed65e76f4 # v1
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: devfile/registry
          event-type: build
          client-payload: '{"repo": "${{ steps.get_commit_info.outputs.REPO }}", "sha": "${{ steps.get_commit_info.outputs.SHA }}"}'

  ociRegistryBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry support source code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Set up QEMU # Enables arm64 image building
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Login to Quay.io
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build and push oci-registry docker image
        run: bash ./oci-registry/build-multi-arch.sh

  devfileRegistryIntegrationBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry support source code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Login to Quay
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build the index server base image
        run: cd tests/integration && bash ./docker-build.sh
      - name: Push the index server base image
        run: cd tests/integration && bash ./docker-push.sh quay.io/devfile/devfile-registry-integration:next
